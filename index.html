<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE Intelligence™ — AI Investment Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0A0D12;
  --bg-1:#10141B;
  --bg-2:#151B24;
  --bg-3:#1B2230;
  --border:#232B38;
  --border-soft:#1A212C;
  --text:#E9EDF3;
  --text-dim:#8C97A8;
  --text-faint:#57616F;
  --emerald:#2FDFA0;
  --emerald-dim:rgba(47,223,160,.12);
  --emerald-line:rgba(47,223,160,.35);
  --amber:#F0A93F;
  --amber-dim:rgba(240,169,63,.12);
  --red:#F0565C;
  --red-dim:rgba(240,86,92,.12);
  --blue:#5B8DEF;
  --radius:14px;
  --radius-sm:9px;
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-lg:0 20px 60px -20px rgba(0,0,0,.6);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(47,223,160,.05), transparent 60%),
    radial-gradient(900px 500px at 0% 100%, rgba(91,141,239,.04), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
::selection{background:var(--emerald-dim); color:var(--emerald);}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg-3); border-radius:8px; border:2px solid transparent; background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:var(--border);}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
.mono{font-family:var(--font-mono);}

/* ---------- APP SHELL ---------- */
#app{
  display:grid;
  grid-template-columns:240px 1fr;
  grid-template-rows:58px 1fr;
  height:100vh;
  width:100vw;
}
/* Sidebar */
#sidebar{
  grid-row:1/3; grid-column:1;
  background:var(--bg-1);
  border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column;
  padding:18px 12px;
}
.brand{
  display:flex; align-items:center; gap:10px;
  padding:4px 8px 20px 8px;
}
.brand-mark{
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg, var(--emerald), #1a9c74);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:13px; color:#06110D; flex-shrink:0;
}
.brand-name{font-weight:700; font-size:14.5px; letter-spacing:.2px;}
.brand-sub{font-size:10px; color:var(--text-faint); font-family:var(--font-mono); letter-spacing:.5px; text-transform:uppercase;}

.nav-group-label{
  font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em;
  padding:14px 10px 6px;
  font-weight:600;
}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:var(--radius-sm);
  color:var(--text-dim); font-size:13px; font-weight:500;
  cursor:pointer; transition:background .12s, color .12s;
  position:relative;
}
.nav-item svg{width:16px; height:16px; flex-shrink:0; opacity:.85;}
.nav-item:hover{background:var(--bg-2); color:var(--text);}
.nav-item.active{background:var(--emerald-dim); color:var(--emerald);}
.nav-item.active svg{opacity:1;}
.nav-item .badge{
  margin-left:auto; font-family:var(--font-mono); font-size:10px;
  background:var(--bg-3); color:var(--text-dim); padding:1px 6px; border-radius:20px;
}
.nav-item.active .badge{background:rgba(47,223,160,.18); color:var(--emerald);}

.sidebar-footer{
  margin-top:auto; padding-top:14px; border-top:1px solid var(--border-soft);
}
.security-strip{
  display:flex; flex-wrap:wrap; gap:5px; padding:10px 8px 4px;
}
.sec-pill{
  font-family:var(--font-mono); font-size:9px; color:var(--text-faint);
  border:1px solid var(--border-soft); border-radius:4px; padding:2px 6px;
  letter-spacing:.03em;
}
.user-row{
  display:flex; align-items:center; gap:9px; padding:10px 8px 2px;
}
.avatar{
  width:28px; height:28px; border-radius:8px; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
  color:var(--emerald); border:1px solid var(--border);
}
.user-name{font-size:12.5px; font-weight:600;}
.user-role{font-size:10.5px; color:var(--text-faint);}

/* Topbar */
#topbar{
  grid-row:1; grid-column:2;
  display:flex; align-items:center; gap:16px;
  padding:0 22px; border-bottom:1px solid var(--border-soft);
  background:rgba(10,13,18,.7); backdrop-filter:blur(10px);
}
.topbar-title{font-weight:700; font-size:15px;}
.topbar-crumb{font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono);}
.search-fake{
  margin-left:auto; display:flex; align-items:center; gap:8px;
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; color:var(--text-faint); font-size:12.5px;
  width:280px; cursor:pointer; transition:border-color .15s;
}
.search-fake:hover{border-color:var(--emerald-line);}
.kbd{
  font-family:var(--font-mono); font-size:10px; background:var(--bg-3);
  border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-dim);
  margin-left:auto;
}
.topbar-icon-btn{
  width:32px; height:32px; border-radius:8px; background:var(--bg-2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; color:var(--text-dim);
}
.topbar-icon-btn svg{width:15px; height:15px;}
.topbar-icon-btn:hover{color:var(--text); border-color:var(--emerald-line);}

/* Main content */
#main{
  grid-row:2; grid-column:2;
  overflow-y:auto;
  padding:26px 30px 90px;
}
.view{animation:fadeUp .28s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

.view-header{margin-bottom:22px;}
.view-title{font-size:21px; font-weight:800; letter-spacing:-.01em;}
.view-desc{color:var(--text-dim); font-size:13px; margin-top:4px;}

/* Grid + cards */
.grid{display:grid; gap:14px;}
.grid-6{grid-template-columns:repeat(6,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1300px){.grid-6{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(2,1fr);}}

.card{
  background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:18px;
}
.card.tight{padding:14px 16px;}
.card-title{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); display:flex; align-items:center; gap:8px; margin-bottom:14px;}
.card-title .dot{width:6px; height:6px; border-radius:50%; background:var(--emerald); box-shadow:0 0 8px var(--emerald);}

.stat-card{padding:16px 16px;}
.stat-label{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; font-weight:600;}
.stat-value{font-family:var(--font-mono); font-size:24px; font-weight:700; margin-top:8px; letter-spacing:-.02em;}
.stat-delta{font-size:11px; margin-top:6px; font-family:var(--font-mono);}
.stat-delta.up{color:var(--emerald);}
.stat-delta.down{color:var(--red);}

.pill{
  display:inline-flex; align-items:center; gap:5px;
  font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px;
  text-transform:uppercase; letter-spacing:.04em;
}
.pill.green{background:var(--emerald-dim); color:var(--emerald);}
.pill.amber{background:var(--amber-dim); color:var(--amber);}
.pill.red{background:var(--red-dim); color:var(--red);}
.pill.gray{background:var(--bg-3); color:var(--text-dim);}

.engine-row{display:flex; flex-wrap:wrap; gap:8px;}
.engine-chip{
  display:flex; align-items:center; gap:7px;
  background:var(--bg-2); border:1px solid var(--border-soft); border-radius:20px;
  padding:6px 12px 6px 8px; font-size:12px; color:var(--text-dim);
}
.engine-chip .led{width:7px; height:7px; border-radius:50%; background:var(--emerald); box-shadow:0 0 6px var(--emerald);}

/* Deal priority cards */
.deal-card{
  border-radius:var(--radius); border:1px solid var(--border-soft);
  background:var(--bg-2); padding:16px; cursor:pointer; transition:border-color .15s, transform .15s;
  display:flex; flex-direction:column; gap:10px;
}
.deal-card:hover{border-color:var(--emerald-line); transform:translateY(-2px);}
.deal-top{display:flex; justify-content:space-between; align-items:flex-start;}
.deal-name{font-weight:700; font-size:14.5px;}
.deal-amount{font-family:var(--font-mono); color:var(--text-dim); font-size:12px; margin-top:2px;}
.deal-score{font-family:var(--font-mono); font-size:26px; font-weight:700;}
.deal-score-label{font-size:10px; color:var(--text-faint); text-transform:uppercase;}
.deal-reasons{font-size:12px; color:var(--text-dim); line-height:1.6;}
.deal-reasons li{margin-left:16px;}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 15px; border-radius:9px; font-size:12.5px; font-weight:600;
  border:1px solid var(--border); background:var(--bg-2); color:var(--text);
  transition:all .15s;
}
.btn:hover{border-color:var(--emerald-line); color:var(--emerald);}
.btn.primary{background:linear-gradient(135deg, var(--emerald), #1a9c74); color:#06170F; border:none;}
.btn.primary:hover{filter:brightness(1.08); color:#06170F;}
.btn.ghost{background:transparent;}
.btn svg{width:14px; height:14px;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap;}

/* Tabs */
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--border-soft); margin-bottom:18px;}
.tab{
  padding:9px 14px; font-size:12.5px; font-weight:600; color:var(--text-dim);
  border-bottom:2px solid transparent; cursor:pointer;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--emerald); border-bottom-color:var(--emerald);}

/* Table */
table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{text-align:left; color:var(--text-faint); font-weight:600; text-transform:uppercase; font-size:10.5px; letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--border-soft);}
td{padding:11px 10px; border-bottom:1px solid var(--border-soft); color:var(--text);}
tr.clickable:hover td{background:var(--bg-2);}

/* Progress bars */
.progress-row{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.progress-label{width:150px; font-size:12px; color:var(--text-dim); flex-shrink:0;}
.progress-track{flex:1; height:7px; background:var(--bg-3); border-radius:20px; overflow:hidden;}
.progress-fill{height:100%; background:linear-gradient(90deg, var(--emerald), #1a9c74); border-radius:20px; transition:width 1.2s cubic-bezier(.2,.8,.2,1);}
.progress-pct{width:36px; text-align:right; font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}

/* Checklist */
.check-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:13px 14px; border-radius:var(--radius-sm); border:1px solid var(--border-soft);
  background:var(--bg-2); margin-bottom:8px; cursor:pointer;
}
.check-row:hover{border-color:var(--border);}
.check-left{display:flex; align-items:center; gap:11px;}
.check-icon{width:20px; height:20px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.check-icon.ok{background:var(--emerald-dim); color:var(--emerald);}
.check-icon.warn{background:var(--amber-dim); color:var(--amber);}
.check-icon.bad{background:var(--red-dim); color:var(--red);}
.check-name{font-weight:600; font-size:13px;}
.check-explain{
  margin-top:8px; padding:12px 14px; border-radius:var(--radius-sm);
  background:var(--bg-3); border-left:3px solid var(--amber); font-size:12px; color:var(--text-dim); line-height:1.6;
  display:none;
}
.check-explain.open{display:block;}
.check-explain b{color:var(--text);}

/* Alert box */
.alert-box{
  border:1px solid rgba(240,86,92,.35); background:var(--red-dim);
  border-radius:var(--radius-sm); padding:14px 16px; display:flex; gap:12px; align-items:flex-start;
}
.alert-box svg{width:18px; height:18px; color:var(--red); flex-shrink:0; margin-top:1px;}

/* Sliders panel */
.slider-group{margin-bottom:16px;}
.slider-label{display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:7px;}
.slider-label b{color:var(--text); font-family:var(--font-mono);}
input[type=range]{
  -webkit-appearance:none; width:100%; height:5px; border-radius:20px;
  background:var(--bg-3); outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--emerald); cursor:pointer; border:3px solid #06170F; box-shadow:0 0 0 1px var(--emerald-line);
}
.scenario-row{display:flex; gap:8px; margin-bottom:18px;}
.scenario-btn{
  flex:1; padding:9px; border-radius:8px; border:1px solid var(--border-soft); background:var(--bg-2);
  font-size:11.5px; font-weight:700; text-align:center; color:var(--text-dim); text-transform:uppercase; letter-spacing:.03em;
}
.scenario-btn.active{border-color:var(--emerald-line); color:var(--emerald); background:var(--emerald-dim);}

.chart-box{position:relative; height:220px;}
.chart-box.tall{height:280px;}

/* Heat map bars */
.heat-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
.heat-label{width:70px; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
.heat-bar{display:flex; gap:3px;}
.heat-blip{width:16px; height:16px; border-radius:3px;}

/* Timeline stepper */
.stepper{display:flex; align-items:center; margin:10px 0 4px;}
.step{display:flex; flex-direction:column; align-items:center; flex:1; position:relative;}
.step-dot{width:12px; height:12px; border-radius:50%; background:var(--emerald); z-index:1; box-shadow:0 0 0 4px var(--bg-2);}
.step.pending .step-dot{background:var(--bg-3); border:2px solid var(--border);}
.step-line{position:absolute; top:5px; left:50%; width:100%; height:2px; background:var(--emerald); z-index:0;}
.step.pending .step-line{background:var(--border);}
.step:last-child .step-line{display:none;}
.step-label{font-size:10.5px; color:var(--text-dim); margin-top:8px; text-align:center; max-width:90px;}

/* Deck strip */
.deck-strip{display:flex; gap:12px; overflow-x:auto; padding-bottom:6px;}
.deck-thumb{
  min-width:150px; height:100px; border-radius:10px; border:1px solid var(--border-soft);
  background:var(--bg-2); display:flex; align-items:center; justify-content:center; text-align:center;
  font-size:11px; font-weight:600; color:var(--text-dim); padding:10px; flex-shrink:0;
}
.deck-thumb b{display:block; font-size:16px; color:var(--emerald); margin-bottom:4px;}

/* Workflow diagram */
.flow{display:flex; align-items:center; flex-wrap:wrap; gap:6px;}
.flow-node{
  padding:9px 14px; border-radius:20px; border:1px solid var(--border-soft); background:var(--bg-2);
  font-size:11.5px; font-weight:600; color:var(--text-dim);
}
.flow-arrow{color:var(--text-faint); font-size:13px;}

/* AI Copilot dock */
#copilot-toggle{
  position:fixed; right:26px; bottom:26px; z-index:40;
  width:52px; height:52px; border-radius:16px; border:none;
  background:linear-gradient(135deg, var(--emerald), #1a9c74);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 12px 30px -8px rgba(47,223,160,.5);
}
#copilot-toggle svg{width:22px; height:22px; color:#06170F;}
#copilot-panel{
  position:fixed; right:26px; bottom:92px; z-index:40;
  width:360px; height:520px; background:var(--bg-1); border:1px solid var(--border);
  border-radius:16px; box-shadow:var(--shadow-lg);
  display:none; flex-direction:column; overflow:hidden;
}
#copilot-panel.open{display:flex;}
.copilot-head{padding:14px 16px; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; gap:9px;}
.copilot-head b{font-size:13px;}
.copilot-body{flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px;}
.msg{max-width:88%; font-size:12.5px; line-height:1.55; padding:10px 12px; border-radius:12px;}
.msg.ai{background:var(--bg-2); border:1px solid var(--border-soft); align-self:flex-start; border-bottom-left-radius:3px;}
.msg.user{background:var(--emerald-dim); color:var(--emerald); align-self:flex-end; border-bottom-right-radius:3px; font-weight:600;}
.copilot-quick{display:flex; flex-wrap:wrap; gap:6px; padding:0 16px 12px;}
.quick-btn{
  font-size:11px; padding:6px 10px; border-radius:20px; border:1px solid var(--border-soft);
  background:var(--bg-2); color:var(--text-dim);
}
.quick-btn:hover{color:var(--emerald); border-color:var(--emerald-line);}
.copilot-input{display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--border-soft);}
.copilot-input input{
  flex:1; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:9px;
  padding:9px 11px; color:var(--text); font-size:12.5px; outline:none;
}
.copilot-input input:focus{border-color:var(--emerald-line);}
.copilot-input button{
  width:36px; border-radius:9px; border:none; background:var(--emerald); color:#06170F;
  display:flex; align-items:center; justify-content:center;
}

/* Command palette */
#cmdk-overlay{
  position:fixed; inset:0; background:rgba(6,8,11,.6); backdrop-filter:blur(3px);
  display:none; align-items:flex-start; justify-content:center; z-index:60; padding-top:14vh;
}
#cmdk-overlay.open{display:flex;}
#cmdk-box{
  width:560px; max-width:90vw; background:var(--bg-1); border:1px solid var(--border);
  border-radius:14px; box-shadow:var(--shadow-lg); overflow:hidden;
}
#cmdk-input{
  width:100%; padding:16px 18px; background:transparent; border:none; outline:none;
  color:var(--text); font-size:14px; border-bottom:1px solid var(--border-soft);
}
#cmdk-list{max-height:340px; overflow-y:auto; padding:8px;}
.cmdk-item{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; font-size:13px; color:var(--text-dim);}
.cmdk-item svg{width:15px; height:15px;}
.cmdk-item.sel{background:var(--emerald-dim); color:var(--emerald);}

/* Toast */
#toast{
  position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px);
  background:var(--bg-1); border:1px solid var(--emerald-line); color:var(--text);
  padding:12px 18px; border-radius:10px; font-size:12.5px; display:flex; align-items:center; gap:10px;
  opacity:0; pointer-events:none; transition:all .3s; z-index:70; box-shadow:var(--shadow-lg);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
#toast .dot-anim{width:8px; height:8px; border-radius:50%; background:var(--emerald); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}

.subtle-note{font-size:11.5px; color:var(--text-faint); font-style:italic; margin-top:10px;}
.section-label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); font-weight:700; margin:22px 0 10px;}
.section-label:first-child{margin-top:0;}

.two-col{display:grid; grid-template-columns:1.3fr .9fr; gap:14px;}
@media (max-width:1300px){.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="brand">
      <div class="brand-mark">PE</div>
      <div>
        <div class="brand-name">PE Intelligence™</div>
        <div class="brand-sub">AI Investment OS</div>
      </div>
    </div>

    <div class="nav-group-label">Workspace</div>
    <div class="nav-item" data-view="dashboard"></div>
    <div class="nav-item" data-view="deals"></div>
    <div class="nav-item" data-view="models"></div>
    <div class="nav-item" data-view="contracts"></div>
    <div class="nav-item" data-view="market"></div>
    <div class="nav-item" data-view="risk"></div>
    <div class="nav-item" data-view="ic"></div>

    <div class="nav-group-label">Fund</div>
    <div class="nav-item" data-view="portfolio"></div>
