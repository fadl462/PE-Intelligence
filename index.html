<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE Intelligence™ — AI Investment Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0A0D12;
  --bg-1:#10141B;
  --bg-2:#151B24;
  --bg-3:#1B2230;
  --border:#232B38;
  --border-soft:#1A212C;
  --text:#E9EDF3;
  --text-dim:#8C97A8;
  --text-faint:#57616F;
  --emerald:#2FDFA0;
  --emerald-dim:rgba(47,223,160,.12);
  --emerald-line:rgba(47,223,160,.35);
  --amber:#F0A93F;
  --amber-dim:rgba(240,169,63,.12);
  --red:#F0565C;
  --red-dim:rgba(240,86,92,.12);
  --blue:#5B8DEF;
  --emerald-dark:#1a9c74;
  --topbar-bg:rgba(10,13,18,.7);
  --radius:14px;
  --radius-sm:9px;
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-lg:0 20px 60px -20px rgba(0,0,0,.6);
}
/* ---- THEME: MIDNIGHT (deep navy, cyan signal) ---- */
[data-theme="midnight"]{
  --bg:#050914;
  --bg-1:#0A1226;
  --bg-2:#0F1B36;
  --bg-3:#152547;
  --border:#22355C;
  --border-soft:#16233F;
  --text:#E7EDF6;
  --text-dim:#8996B3;
  --text-faint:#4F5C79;
  --emerald:#3FD8E8;
  --emerald-dim:rgba(63,216,232,.14);
  --emerald-line:rgba(63,216,232,.4);
  --emerald-dark:#1690a0;
  --amber:#F0A93F;
  --amber-dim:rgba(240,169,63,.12);
  --red:#F0565C;
  --red-dim:rgba(240,86,92,.12);
  --blue:#8DA5F5;
  --topbar-bg:rgba(5,9,20,.72);
}
[data-theme="midnight"] body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(63,216,232,.07), transparent 60%),
    radial-gradient(900px 500px at 0% 100%, rgba(141,165,245,.06), transparent 60%),
    var(--bg);
}
/* ---- THEME: IVORY (light, client-facing) ---- */
[data-theme="ivory"]{
  --bg:#F4F6F8;
  --bg-1:#FFFFFF;
  --bg-2:#FBFBFC;
  --bg-3:#EEF1F4;
  --border:#DFE4EA;
  --border-soft:#E8ECF0;
  --text:#171B22;
  --text-dim:#5C6672;
  --text-faint:#95A0AC;
  --emerald:#0EA372;
  --emerald-dim:rgba(14,163,114,.10);
  --emerald-line:rgba(14,163,114,.35);
  --amber:#B9750B;
  --amber-dim:rgba(185,117,11,.10);
  --red:#D6373F;
  --red-dim:rgba(214,55,63,.10);
  --blue:#3D6FD1;
  --emerald-dark:#0b7d59;
  --topbar-bg:rgba(255,255,255,.78);
  --shadow-lg:0 20px 50px -25px rgba(23,27,34,.25);
}
[data-theme="ivory"] body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(14,163,114,.05), transparent 60%),
    radial-gradient(900px 500px at 0% 100%, rgba(61,111,209,.04), transparent 60%),
    var(--bg);
}
[data-theme="ivory"] .brand-mark{ color:#F4FBF8; }
[data-theme="ivory"] input[type=range]::-webkit-slider-thumb{ border-color:#fff; }
[data-theme="ivory"] ::-webkit-scrollbar-thumb{ background:#D9DEE5; }
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow-x:hidden;}
body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(47,223,160,.05), transparent 60%),
    radial-gradient(900px 500px at 0% 100%, rgba(91,141,239,.04), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
::selection{background:var(--emerald-dim); color:var(--emerald);}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg-3); border-radius:8px; border:2px solid transparent; background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:var(--border);}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
.mono{font-family:var(--font-mono);}

/* ---------- APP SHELL ---------- */
#app{
  display:grid;
  grid-template-columns:240px 1fr;
  grid-template-rows:58px 1fr;
  height:100vh;
  width:100vw;
}
/* Sidebar */
#sidebar{
  grid-row:1/3; grid-column:1;
  background:var(--bg-1);
  border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column;
  padding:18px 12px;
}
.brand{
  display:flex; align-items:center; gap:10px;
  padding:4px 8px 20px 8px;
}
.brand-mark{
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg, var(--emerald), var(--emerald-dark));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:13px; color:#06110D; flex-shrink:0;
}
.brand-name{font-weight:700; font-size:14.5px; letter-spacing:.2px;}
.brand-sub{font-size:10px; color:var(--text-faint); font-family:var(--font-mono); letter-spacing:.5px; text-transform:uppercase;}

.nav-group-label{
  font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em;
  padding:14px 10px 6px;
  font-weight:600;
}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:var(--radius-sm);
  color:var(--text-dim); font-size:13px; font-weight:500;
  cursor:pointer; transition:background .12s, color .12s;
  position:relative;
}
.nav-item svg{width:16px; height:16px; flex-shrink:0; opacity:.85;}
.nav-item:hover{background:var(--bg-2); color:var(--text);}
.nav-item.active{background:var(--emerald-dim); color:var(--emerald);}
.nav-item.active svg{opacity:1;}
.nav-item .badge{
  margin-left:auto; font-family:var(--font-mono); font-size:10px;
  background:var(--bg-3); color:var(--text-dim); padding:1px 6px; border-radius:20px;
}
.nav-item.active .badge{background:rgba(47,223,160,.18); color:var(--emerald);}

.sidebar-footer{
  margin-top:auto; padding-top:14px; border-top:1px solid var(--border-soft);
}
.sidebar-theme-row{display:none; align-items:center; justify-content:space-between; padding:2px 8px 12px;}
.sidebar-theme-label{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; font-weight:600;}
.security-strip{
  display:flex; flex-wrap:wrap; gap:5px; padding:10px 8px 4px;
}
.sec-pill{
  font-family:var(--font-mono); font-size:9px; color:var(--text-faint);
  border:1px solid var(--border-soft); border-radius:4px; padding:2px 6px;
  letter-spacing:.03em;
}
.user-row{
  display:flex; align-items:center; gap:9px; padding:10px 8px 2px;
}
.avatar{
  width:28px; height:28px; border-radius:8px; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
  color:var(--emerald); border:1px solid var(--border);
}
.user-name{font-size:12.5px; font-weight:600;}
.user-role{font-size:10.5px; color:var(--text-faint);}

/* Topbar */
#topbar{
  grid-row:1; grid-column:2;
  display:flex; align-items:center; gap:16px;
  padding:0 22px; border-bottom:1px solid var(--border-soft);
  background:var(--topbar-bg); backdrop-filter:blur(10px);
  position:relative; z-index:20;
}
.topbar-title{font-weight:700; font-size:15px;}
.topbar-crumb{font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono);}
.search-fake{
  margin-left:auto; display:flex; align-items:center; gap:8px;
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; color:var(--text-faint); font-size:12.5px;
  width:280px; cursor:pointer; transition:border-color .15s;
}
.search-fake:hover{border-color:var(--emerald-line);}
.kbd{
  font-family:var(--font-mono); font-size:10px; background:var(--bg-3);
  border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-dim);
  margin-left:auto;
}
.topbar-icon-btn{
  width:32px; height:32px; border-radius:8px; background:var(--bg-2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; color:var(--text-dim);
}
.topbar-icon-btn svg{width:15px; height:15px;}
.topbar-icon-btn:hover{color:var(--text); border-color:var(--emerald-line);}

/* Main content */
#main{
  grid-row:2; grid-column:2;
  overflow-y:auto;
  padding:26px 30px 90px;
}
.view{animation:fadeUp .28s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

.view-header{margin-bottom:22px;}
.view-title{font-size:21px; font-weight:800; letter-spacing:-.01em;}
.view-desc{color:var(--text-dim); font-size:13px; margin-top:4px;}

/* Grid + cards */
.grid{display:grid; gap:14px;}
.grid-6{grid-template-columns:repeat(6,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1300px){.grid-6{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(2,1fr);}}

.card{
  background:linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:18px;
}
.card.tight{padding:14px 16px;}
.card-title{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); display:flex; align-items:center; gap:8px; margin-bottom:14px;}
.card-title .dot{width:6px; height:6px; border-radius:50%; background:var(--emerald); box-shadow:0 0 8px var(--emerald);}

.stat-card{padding:16px 16px;}
.stat-label{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; font-weight:600;}
.stat-value{font-family:var(--font-mono); font-size:24px; font-weight:700; margin-top:8px; letter-spacing:-.02em;}
.stat-delta{font-size:11px; margin-top:6px; font-family:var(--font-mono);}
.stat-delta.up{color:var(--emerald);}
.stat-delta.down{color:var(--red);}

.pill{
  display:inline-flex; align-items:center; gap:5px;
  font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px;
  text-transform:uppercase; letter-spacing:.04em;
}
.pill.green{background:var(--emerald-dim); color:var(--emerald);}
.pill.amber{background:var(--amber-dim); color:var(--amber);}
.pill.red{background:var(--red-dim); color:var(--red);}
.pill.gray{background:var(--bg-3); color:var(--text-dim);}

.engine-row{display:flex; flex-wrap:wrap; gap:8px;}
.engine-chip{
  display:flex; align-items:center; gap:7px;
  background:var(--bg-2); border:1px solid var(--border-soft); border-radius:20px;
  padding:6px 12px 6px 8px; font-size:12px; color:var(--text-dim);
}
.engine-chip .led{width:7px; height:7px; border-radius:50%; background:var(--emerald); box-shadow:0 0 6px var(--emerald);}

/* Deal priority cards */
.deal-card{
  border-radius:var(--radius); border:1px solid var(--border-soft);
  background:var(--bg-2); padding:16px; cursor:pointer; transition:border-color .15s, transform .15s;
  display:flex; flex-direction:column; gap:10px;
}
.deal-card:hover{border-color:var(--emerald-line); transform:translateY(-2px);}
.deal-top{display:flex; justify-content:space-between; align-items:flex-start;}
.deal-name{font-weight:700; font-size:14.5px;}
.deal-amount{font-family:var(--font-mono); color:var(--text-dim); font-size:12px; margin-top:2px;}
.deal-score{font-family:var(--font-mono); font-size:26px; font-weight:700;}
.deal-score-label{font-size:10px; color:var(--text-faint); text-transform:uppercase;}
.deal-reasons{font-size:12px; color:var(--text-dim); line-height:1.6;}
.deal-reasons li{margin-left:16px;}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 15px; border-radius:9px; font-size:12.5px; font-weight:600;
  border:1px solid var(--border); background:var(--bg-2); color:var(--text);
  transition:all .15s;
}
.btn:hover{border-color:var(--emerald-line); color:var(--emerald);}
.btn.primary{background:linear-gradient(135deg, var(--emerald), var(--emerald-dark)); color:#06170F; border:none;}
.btn.primary:hover{filter:brightness(1.08); color:#06170F;}
.btn.ghost{background:transparent;}
.btn svg{width:14px; height:14px;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap;}

/* Tabs */
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--border-soft); margin-bottom:18px;}
.tab{
  padding:9px 14px; font-size:12.5px; font-weight:600; color:var(--text-dim);
  border-bottom:2px solid transparent; cursor:pointer;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--emerald); border-bottom-color:var(--emerald);}

/* Table */
table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{text-align:left; color:var(--text-faint); font-weight:600; text-transform:uppercase; font-size:10.5px; letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--border-soft);}
td{padding:11px 10px; border-bottom:1px solid var(--border-soft); color:var(--text);}
tr.clickable:hover td{background:var(--bg-2);}

/* Progress bars */
.progress-row{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.progress-label{width:150px; font-size:12px; color:var(--text-dim); flex-shrink:0;}
.progress-track{flex:1; height:7px; background:var(--bg-3); border-radius:20px; overflow:hidden;}
.progress-fill{height:100%; background:linear-gradient(90deg, var(--emerald), var(--emerald-dark)); border-radius:20px; transition:width 1.2s cubic-bezier(.2,.8,.2,1);}
.progress-pct{width:36px; text-align:right; font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}

/* Checklist */
.check-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:13px 14px; border-radius:var(--radius-sm); border:1px solid var(--border-soft);
  background:var(--bg-2); margin-bottom:8px; cursor:pointer;
}
.check-row:hover{border-color:var(--border);}
.check-left{display:flex; align-items:center; gap:11px;}
.check-icon{width:20px; height:20px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.check-icon.ok{background:var(--emerald-dim); color:var(--emerald);}
.check-icon.warn{background:var(--amber-dim); color:var(--amber);}
.check-icon.bad{background:var(--red-dim); color:var(--red);}
.check-name{font-weight:600; font-size:13px;}
.check-explain{
  margin-top:8px; padding:12px 14px; border-radius:var(--radius-sm);
  background:var(--bg-3); border-left:3px solid var(--amber); font-size:12px; color:var(--text-dim); line-height:1.6;
  display:none;
}
.check-explain.open{display:block;}
.check-explain b{color:var(--text);}

/* Alert box */
.alert-box{
  border:1px solid rgba(240,86,92,.35); background:var(--red-dim);
  border-radius:var(--radius-sm); padding:14px 16px; display:flex; gap:12px; align-items:flex-start;
}
.alert-box svg{width:18px; height:18px; color:var(--red); flex-shrink:0; margin-top:1px;}

/* Sliders panel */
.slider-group{margin-bottom:16px;}
.slider-label{display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:7px;}
.slider-label b{color:var(--text); font-family:var(--font-mono);}
input[type=range]{
  -webkit-appearance:none; width:100%; height:5px; border-radius:20px;
  background:var(--bg-3); outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--emerald); cursor:pointer; border:3px solid #06170F; box-shadow:0 0 0 1px var(--emerald-line);
}
.scenario-row{display:flex; gap:8px; margin-bottom:18px;}
.scenario-btn{
  flex:1; padding:9px; border-radius:8px; border:1px solid var(--border-soft); background:var(--bg-2);
  font-size:11.5px; font-weight:700; text-align:center; color:var(--text-dim); text-transform:uppercase; letter-spacing:.03em;
}
.scenario-btn.active{border-color:var(--emerald-line); color:var(--emerald); background:var(--emerald-dim);}

.chart-box{position:relative; height:220px;}
.chart-box.tall{height:280px;}

/* Heat map bars */
.heat-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
.heat-label{width:70px; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
.heat-bar{display:flex; gap:3px;}
.heat-blip{width:16px; height:16px; border-radius:3px;}

/* Timeline stepper */
.stepper{display:flex; align-items:center; margin:10px 0 4px;}
.step{display:flex; flex-direction:column; align-items:center; flex:1; position:relative;}
.step-dot{width:12px; height:12px; border-radius:50%; background:var(--emerald); z-index:1; box-shadow:0 0 0 4px var(--bg-2);}
.step.pending .step-dot{background:var(--bg-3); border:2px solid var(--border);}
.step-line{position:absolute; top:5px; left:50%; width:100%; height:2px; background:var(--emerald); z-index:0;}
.step.pending .step-line{background:var(--border);}
.step:last-child .step-line{display:none;}
.step-label{font-size:10.5px; color:var(--text-dim); margin-top:8px; text-align:center; max-width:90px;}

/* Deck strip */
.deck-strip{display:flex; gap:12px; overflow-x:auto; padding-bottom:6px;}
.deck-thumb{
  min-width:150px; height:100px; border-radius:10px; border:1px solid var(--border-soft);
  background:var(--bg-2); display:flex; align-items:center; justify-content:center; text-align:center;
  font-size:11px; font-weight:600; color:var(--text-dim); padding:10px; flex-shrink:0;
}
.deck-thumb b{display:block; font-size:16px; color:var(--emerald); margin-bottom:4px;}
.deck-thumb.active{border-color:var(--emerald-line); background:var(--emerald-dim); color:var(--text);}

/* ---------- SLIDE PREVIEW ROLLOUT (Committee Deck) ---------- */
.slide-preview{
  max-height:0; opacity:0; overflow:hidden; margin-top:0;
  transition:max-height .45s cubic-bezier(.22,.8,.24,1), opacity .3s ease .05s, margin-top .45s cubic-bezier(.22,.8,.24,1);
}
.slide-preview.open{ max-height:260px; opacity:1; margin-top:16px; }
.slide-preview-inner{
  padding:18px 20px; border-radius:var(--radius); border:1px solid var(--emerald-line);
  background:var(--emerald-dim);
}
.slide-preview-eyebrow{font-size:10.5px; font-weight:700; color:var(--emerald); letter-spacing:.08em; margin-bottom:8px;}
.slide-preview-title{font-size:16px; font-weight:800; margin-bottom:8px;}
.slide-preview-body{font-size:13px; color:var(--text-dim); line-height:1.65;}

/* Workflow diagram */
.flow{display:flex; align-items:center; flex-wrap:wrap; gap:6px;}
.flow-node{
  padding:9px 14px; border-radius:20px; border:1px solid var(--border-soft); background:var(--bg-2);
  font-size:11.5px; font-weight:600; color:var(--text-dim);
}
.flow-arrow{color:var(--text-faint); font-size:13px;}

/* AI Copilot dock */
#copilot-toggle{
  position:fixed; right:26px; bottom:26px; z-index:40;
  width:52px; height:52px; border-radius:16px; border:none;
  background:linear-gradient(135deg, var(--emerald), var(--emerald-dark));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 12px 30px -8px rgba(47,223,160,.5);
}
#copilot-toggle svg{width:22px; height:22px; color:#06170F;}
#copilot-panel{
  position:fixed; right:26px; bottom:92px; z-index:40;
  width:360px; height:520px; background:var(--bg-1); border:1px solid var(--border);
  border-radius:16px; box-shadow:var(--shadow-lg);
  display:none; flex-direction:column; overflow:hidden;
}
#copilot-panel.open{display:flex;}
.copilot-head{padding:14px 16px; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; gap:9px;}
.copilot-head b{font-size:13px;}
.copilot-body{flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px;}
.msg{max-width:88%; font-size:12.5px; line-height:1.55; padding:10px 12px; border-radius:12px;}
.msg.ai{background:var(--bg-2); border:1px solid var(--border-soft); align-self:flex-start; border-bottom-left-radius:3px;}
.msg.user{background:var(--emerald-dim); color:var(--emerald); align-self:flex-end; border-bottom-right-radius:3px; font-weight:600;}
.copilot-quick{display:flex; flex-wrap:wrap; gap:6px; padding:0 16px 12px;}
.quick-btn{
  font-size:11px; padding:6px 10px; border-radius:20px; border:1px solid var(--border-soft);
  background:var(--bg-2); color:var(--text-dim);
}
.quick-btn:hover{color:var(--emerald); border-color:var(--emerald-line);}
.copilot-input{display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--border-soft);}
.copilot-input input{
  flex:1; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:9px;
  padding:9px 11px; color:var(--text); font-size:12.5px; outline:none;
}
.copilot-input input:focus{border-color:var(--emerald-line);}
.copilot-input button{
  width:36px; border-radius:9px; border:none; background:var(--emerald); color:#06170F;
  display:flex; align-items:center; justify-content:center;
}

/* Command palette */
#cmdk-overlay{
  position:fixed; inset:0; background:rgba(6,8,11,.6); backdrop-filter:blur(3px);
  display:none; align-items:flex-start; justify-content:center; z-index:60; padding-top:14vh;
}
#cmdk-overlay.open{display:flex;}
#cmdk-box{
  width:560px; max-width:90vw; background:var(--bg-1); border:1px solid var(--border);
  border-radius:14px; box-shadow:var(--shadow-lg); overflow:hidden;
}
#cmdk-input{
  width:100%; padding:16px 18px; background:transparent; border:none; outline:none;
  color:var(--text); font-size:14px; border-bottom:1px solid var(--border-soft);
}
#cmdk-list{max-height:340px; overflow-y:auto; padding:8px;}
.cmdk-item{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; font-size:13px; color:var(--text-dim);}
.cmdk-item svg{width:15px; height:15px;}
.cmdk-item.sel{background:var(--emerald-dim); color:var(--emerald);}

/* Toast */
#toast{
  position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px);
  background:var(--bg-1); border:1px solid var(--emerald-line); color:var(--text);
  padding:12px 18px; border-radius:10px; font-size:12.5px; display:flex; align-items:center; gap:10px;
  opacity:0; pointer-events:none; transition:all .3s; z-index:70; box-shadow:var(--shadow-lg);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
#toast .dot-anim{width:8px; height:8px; border-radius:50%; background:var(--emerald); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}

.subtle-note{font-size:11.5px; color:var(--text-faint); font-style:italic; margin-top:10px;}
.section-label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); font-weight:700; margin:22px 0 10px;}
.section-label:first-child{margin-top:0;}

.two-col{display:grid; grid-template-columns:1.3fr .9fr; gap:14px;}
@media (max-width:1300px){.two-col{grid-template-columns:1fr;}}

/* ---------- UPLOAD DROPZONE ---------- */
.upload-dropzone{
  border:1.5px dashed var(--border); border-radius:12px; padding:22px 20px;
  text-align:center; color:var(--text-dim); transition:border-color .15s, background .15s;
}
.upload-dropzone:hover{border-color:var(--emerald-line); background:var(--emerald-dim);}
.upload-dropzone-icon{
  width:42px; height:42px; margin:0 auto; border-radius:12px; background:var(--bg-3);
  display:flex; align-items:center; justify-content:center; color:var(--emerald);
}
.upload-dropzone-icon svg{width:20px; height:20px;}

/* ---------- TOOLTIP SYSTEM ---------- */
[data-tip]{position:relative;}
[data-tip]::after{
  content:attr(data-tip);
  position:absolute; left:50%; bottom:calc(100% + 10px); transform:translateX(-50%) translateY(4px);
  background:#0C1016; color:#E9EDF3; font-size:11px; font-weight:500; line-height:1.4;
  padding:7px 11px; border-radius:8px; border:1px solid rgba(255,255,255,.08);
  white-space:normal; width:max-content; max-width:220px; text-align:center;
  box-shadow:0 12px 30px -10px rgba(0,0,0,.6);
  opacity:0; visibility:hidden; pointer-events:none; z-index:80;
  transition:opacity .15s ease, transform .15s ease;
}
[data-tip]::before{
  content:""; position:absolute; left:50%; bottom:calc(100% + 5px); transform:translateX(-50%);
  border:5px solid transparent; border-top-color:#0C1016;
  opacity:0; visibility:hidden; pointer-events:none; z-index:80; transition:opacity .15s ease;
}
[data-tip]:hover::after, [data-tip]:hover::before{opacity:1; visibility:visible; transform:translateX(-50%) translateY(0);}
/* CRITICAL: pseudo-element content on table-row/table-structural elements forces
   browsers to generate an invisible anonymous table-cell to hold it, which corrupts
   the table's column count/alignment. Table rows get a native title-attribute
   tooltip instead (see .clickable tr / tr.clickable handling in JS). */
tr[data-tip]::before, tr[data-tip]::after,
table[data-tip]::before, table[data-tip]::after,
thead[data-tip]::before, thead[data-tip]::after,
tbody[data-tip]::before, tbody[data-tip]::after{ content:none !important; }
.clickable-item, .card.clickable, .deal-card, .check-row, .engine-chip, tr.clickable,
.deck-thumb, .sec-pill, .stat-card.clickable{cursor:pointer;}
.card.clickable, .stat-card.clickable{transition:border-color .15s, transform .15s, background .15s;}
.card.clickable:hover, .stat-card.clickable:hover{border-color:var(--emerald-line); transform:translateY(-2px);}
.engine-chip{cursor:pointer; transition:border-color .15s, transform .15s;}
.engine-chip:hover{border-color:var(--emerald-line); transform:translateY(-1px);}
.sec-pill{cursor:pointer; transition:border-color .15s, color .15s;}
.sec-pill:hover{border-color:var(--emerald-line); color:var(--emerald);}
.deck-thumb{cursor:pointer; transition:border-color .15s, transform .15s;}
.deck-thumb:hover{border-color:var(--emerald-line); transform:translateY(-2px);}
.heat-blip{cursor:default;}

/* ---------- HOUN TICKER (topbar) ---------- */
.houn-ticker{
  display:flex; align-items:center; gap:8px; margin-left:22px;
  padding:6px 12px; border-radius:20px; background:var(--bg-2); border:1px solid var(--border-soft);
  font-size:11.5px; color:var(--text-dim); max-width:320px; overflow:hidden;
}
.houn-ticker-dot{width:7px; height:7px; border-radius:50%; background:var(--emerald); flex-shrink:0; box-shadow:0 0 8px var(--emerald); animation:pulse 1.4s infinite;}
.houn-ticker-text{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:opacity .3s ease;}
.houn-ticker-text.fade{opacity:0;}

/* ---------- HOUN avatar / pulse ---------- */
.houn-avatar{position:relative; display:flex; align-items:center; justify-content:center; font-size:14px;}
.houn-avatar-dot{position:absolute; bottom:-1px; right:-1px; width:8px; height:8px; border-radius:50%; background:var(--emerald); border:2px solid var(--bg-1); animation:pulse 1.4s infinite;}
.houn-pulse-ring{
  position:absolute; inset:-4px; border-radius:18px; border:2px solid var(--emerald);
  opacity:0; pointer-events:none;
}
.houn-pulse-ring.thinking{animation:ring-pulse 1.1s ease-out infinite;}
@keyframes ring-pulse{0%{opacity:.7; transform:scale(.9);} 100%{opacity:0; transform:scale(1.25);}}
.typing-dots{display:inline-flex; gap:3px; align-items:center; padding:2px 0;}
.typing-dots span{width:5px; height:5px; border-radius:50%; background:var(--text-dim); animation:typing-bounce 1.1s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0); opacity:.5;} 30%{transform:translateY(-4px); opacity:1;}}

/* ---------- THEME SWITCHER ---------- */
.theme-switcher{display:flex; align-items:center; gap:4px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:20px; padding:4px;}
.theme-swatch{
  width:26px; height:26px; border-radius:16px; display:flex; align-items:center; justify-content:center;
  color:var(--text-faint); transition:all .15s;
}
.theme-swatch svg{width:13px; height:13px;}
.theme-swatch.active{background:var(--emerald-dim); color:var(--emerald);}
.theme-swatch:hover{color:var(--text);}

/* ---------- NOTIFICATIONS ---------- */
#notif-dropdown{
  position:absolute; top:44px; right:0; width:320px; background:var(--bg-1); border:1px solid var(--border);
  border-radius:14px; box-shadow:var(--shadow-lg); display:none; z-index:50; overflow:hidden;
}
#notif-dropdown.open{display:block;}
.notif-head{padding:12px 14px; border-bottom:1px solid var(--border-soft); font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em;}
.notif-item{padding:12px 14px; border-bottom:1px solid var(--border-soft); cursor:pointer; transition:background .15s;}
.notif-item:last-child{border-bottom:none;}
.notif-item:hover{background:var(--bg-2);}
.notif-title{display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; margin-bottom:4px;}
.notif-dot{width:6px; height:6px; border-radius:50%; flex-shrink:0;}
.notif-body{font-size:11.5px; color:var(--text-dim); line-height:1.5;}

/* ---------- DETAIL MODAL ---------- */
#detail-overlay{
  position:fixed; inset:0; background:rgba(6,8,11,.55); backdrop-filter:blur(3px);
  display:none; align-items:center; justify-content:center; z-index:65; padding:20px;
}
#detail-overlay.open{display:flex;}
#detail-box{
  width:480px; max-width:100%; background:var(--bg-1); border:1px solid var(--border);
  border-radius:16px; box-shadow:var(--shadow-lg); padding:22px 24px; animation:fadeUp .2s ease;
}
#detail-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;}
#detail-eyebrow{font-size:10.5px; font-weight:700; color:var(--emerald); letter-spacing:.08em; margin-bottom:4px;}
#detail-title{font-size:16px; font-weight:800;}
#detail-close{width:28px; height:28px; border-radius:8px; border:1px solid var(--border-soft); background:var(--bg-2); color:var(--text-dim); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
#detail-close svg{width:14px; height:14px;}
#detail-close:hover{color:var(--text); border-color:var(--emerald-line);}
#detail-body{font-size:13px; color:var(--text-dim); line-height:1.65;}

/* ---------- AI WORKING BANNER (in-context) ---------- */
.working-banner{
  display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px;
  background:var(--emerald-dim); border:1px solid var(--emerald-line); font-size:12px; color:var(--emerald);
  margin-bottom:14px;
}
.working-banner .spin{
  width:13px; height:13px; border-radius:50%; border:2px solid rgba(47,223,160,.3); border-top-color:var(--emerald);
  animation:spin .7s linear infinite; flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- HAMBURGER (mobile sidebar toggle) ---------- */
#hamburger-btn{
  display:none; width:34px; height:34px; border-radius:8px; border:1px solid var(--border-soft);
  background:var(--bg-2); color:var(--text-dim); align-items:center; justify-content:center; flex-shrink:0; margin-right:6px;
}
#hamburger-btn svg{width:17px; height:17px;}
#sidebar-backdrop{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:35;
}
#sidebar-backdrop.open{display:block;}

/* ---------- RESPONSIVE / MOBILE ---------- */
@media (max-width:960px){
  #app{ grid-template-columns:1fr; }
  #sidebar{
    position:fixed; top:0; left:0; bottom:0; z-index:45; width:250px; max-width:85vw;
    transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(0,0,0,.5);
  }
  #sidebar.open{ transform:translateX(0); }
  #topbar{ grid-column:1; }
  #main{ grid-column:1; }
  #hamburger-btn{ display:flex; }
  .houn-ticker{ display:none; }
  .search-fake{ width:auto; flex:1; min-width:0; }
  .search-fake span:not(.kbd){ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .topbar-theme-switcher{ display:none; }
  .sidebar-theme-row{ display:flex; }
}
@media (max-width:760px){
  #main{ padding:16px 14px 90px; }
  #topbar{ padding:0 14px; gap:10px; }
  .view-title{ font-size:18px; }
  .grid-6, .grid-4, .grid-3, .grid-2{ grid-template-columns:1fr 1fr; }
  .two-col{ grid-template-columns:1fr; }
  .kbd{ display:none; }
  .search-fake{ font-size:11.5px; padding:7px 9px; }
  #copilot-panel{
    left:14px; right:14px; width:auto; bottom:82px; height:min(520px, 70vh);
  }
  #copilot-toggle{ right:16px; bottom:16px; }
  .deal-card, .card{ padding:14px; }
  #detail-box{ width:100%; }
  table{ font-size:11.5px; }
  th, td{ padding:8px 6px; }
}
@media (max-width:480px){
  .grid-6, .grid-4, .grid-3, .grid-2{ grid-template-columns:1fr 1fr; }
  .stat-value{ font-size:19px; }
  .brand-sub{ display:none; }
  .user-role{ display:none; }
  #topbar-crumb{ display:none; }
  .btn-row{ gap:6px; }
  .btn{ padding:8px 11px; font-size:11.5px; }
  .engine-row{ gap:6px; }
  .engine-chip{ font-size:11px; padding:5px 9px 5px 7px; }
}
</style>
